name: build

on:
  push:
    ignore:
      - 'docs/**'
      - '.github/**'
      - '*.sh'
      - '*.md'
    tags-ignore:
      - '**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24

      - name: Build
        run: go build -o fflint ./cmd/fflint/main.go